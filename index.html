<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>遊筆 — 動きを書き取る筆</title>
<style>
  :root{
    --ink:#15171b;
    --surface:#1e2127;
    --line:#2c3038;
    --text:#ece7db;
    --text-dim:#9a958a;
    --seal:#b8503c;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--ink);color:var(--text);
    font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;
    font-size:15px;line-height:1.6;}
  body{max-width:640px;margin:0 auto;padding:14px 14px calc(20px + env(safe-area-inset-bottom));}

  header{display:flex;align-items:center;gap:12px;padding:6px 2px 16px;}
  .seal{width:34px;height:34px;flex:none;border-radius:6px;background:var(--seal);
    color:#f5efe2;display:grid;place-items:center;
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:19px;font-weight:600;}
  .title-block{position:relative;padding-left:14px;}
  .title-block::before{content:"";position:absolute;left:0;top:2px;bottom:2px;width:1px;
    background:linear-gradient(var(--text-dim),transparent);}
  h1{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-size:22px;font-weight:600;letter-spacing:.14em;}
  .subtitle{font-size:11.5px;color:var(--text-dim);letter-spacing:.06em;}

  #setup{border:1px dashed var(--line);border-radius:12px;padding:26px 18px;
    text-align:center;background:var(--surface);}
  #status{color:var(--text-dim);font-size:13px;margin-bottom:14px;min-height:1.4em;}
  .file-btn{display:inline-block;background:var(--text);color:var(--ink);
    border:none;border-radius:10px;padding:12px 22px;font-size:15px;font-weight:600;cursor:pointer;}
  #file{display:none;}

  #stage{display:none;position:relative;border-radius:12px;overflow:hidden;
    background:#08131a;margin-bottom:12px;}
  #stage.on{display:block;}
  #video{display:block;width:100%;height:auto;opacity:.25;transition:opacity .3s;}
  #video.hidden{opacity:0;}
  #canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}

  .panel{display:none;}
  .panel.on{display:block;}
  .row{display:flex;gap:8px;justify-content:center;align-items:center;margin-bottom:10px;}
  .ctl{background:var(--surface);border:1px solid var(--line);color:var(--text);
    border-radius:10px;font-size:14px;padding:10px 0;flex:1;cursor:pointer;}
  .ctl:active{background:var(--line);}
  .ctl.play{font-weight:700;}
  .seg{display:flex;flex:1;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .seg button{flex:1;background:var(--surface);border:none;color:var(--text-dim);
    padding:11px 0;font-size:14px;cursor:pointer;}
  .seg button.active{background:var(--text);color:var(--ink);font-weight:700;}
  .tgl{flex:1;min-width:64px;background:var(--surface);border:1px solid var(--line);
    color:var(--text-dim);border-radius:10px;padding:9px 0;font-size:13px;
    text-align:center;cursor:pointer;user-select:none;}
  .tgl.active{color:var(--text);border-color:var(--text-dim);font-weight:600;}
  .tgl.off{opacity:.3;pointer-events:none;}
  #seek{width:100%;accent-color:var(--text);height:26px;}
  .timecode{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:12px;color:var(--text-dim);text-align:center;margin:2px 0 10px;}

  footer{font-size:11.5px;color:var(--text-dim);line-height:1.7;padding:4px 2px;}
</style>
</head>
<body>

<header>
  <div class="seal">筆</div>
  <div class="title-block">
    <h1>遊筆</h1>
    <div class="subtitle">動きをなぞってみる遊び</div>
  </div>
</header>

<div id="setup">
  <div id="status">AIモデルを読み込んでいます…</div>
  <label class="file-btn">動きの動画を選ぶ<input type="file" id="file" accept="video/*"></label>
</div>

<div id="stage">
  <video id="video" playsinline muted preload="metadata"></video>
  <canvas id="canvas"></canvas>
</div>

<div class="panel" id="panel">
  <input type="range" id="seek" min="0" max="0" step="0.01" value="0">
  <div class="timecode"><span id="tcur">0:00.0</span> / <span id="tdur">0:00.0</span></div>
  <div class="row">
    <div class="seg" id="brushSeg">
      <button data-b="mizu" class="active">水</button>
      <button data-b="tama">珠</button>
      <button data-b="hikari">光</button>
      <button data-b="honoo">炎</button>
    </div>
  </div>
  <div class="row">
    <button class="ctl play" id="play">▶ 書きはじめる</button>
    <button class="ctl" id="restart">最初から</button>
    <button class="ctl" id="save">PNG保存</button>
  </div>
  <div class="row">
    <div class="seg" id="speedSeg">
      <button data-s="1" class="active">1×</button>
      <button data-s="0.5">0.5×</button>
      <button data-s="0.25">0.25×</button>
    </div>
  </div>
  <div class="row">
    <div class="tgl active" data-p="lw">左手</div>
    <div class="tgl active" data-p="rw">右手</div>
    <div class="tgl" data-p="la">左足</div>
    <div class="tgl" data-p="ra">右足</div>
    <div class="tgl active" id="ghost">演者</div>
  </div>
</div>

<footer>
  <b>水</b> — 手先の軌跡。全身が大きく動くほど流れは太く明るく、しばらくすると消える。<br>
  <b>珠</b> — ※これだけ軌跡ではなく「今この瞬間」の全身。各関節は速く動いた分だけ灯る。追跡点の選択は効かない。<br>
  <b>光</b> — 手先の軌跡。速いほど白く光り、ゆっくり闇に還る。<br>
  <b>炎</b> — 追跡点に宿る火。動きが薪になり、速いほど燃え上がる。止まると種火だけが残る。
</footer>

<script type="module">
import { PoseLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const $ = id => document.getElementById(id);
const video = $("video"), canvas = $("canvas"), ctx = canvas.getContext("2d");
const statusEl = $("status");

/* 追跡点: 手首15/16、足首27/28 */
const POINTS = {
  lw:{ idx:15, on:true }, rw:{ idx:16, on:true },
  la:{ idx:27, on:false }, ra:{ idx:28, on:false },
};

/* 全身の関節: 珠の連なりと、水の流れ(完整一氣の近似)の計算に使う */
const BODY_IDX = [11,12,13,14,15,16,23,24,25,26,27,28];
const body = {};        /* idx → { sm:[x,y], v } */
let flow = 0;           /* 0..1 全身の流れ */
const mid = (p,q) => (p && q) ? [(p[0]+q[0])/2,(p[1]+q[1])/2] : null;

function updateBody(lm, dt) {
  const diag = Math.hypot(canvas.width, canvas.height);
  let sum = 0, cnt = 0;
  for (const i of BODY_IDX) {
    const raw = lm[i];
    const b = body[i] || (body[i] = { sm:null, v:0 });
    if (!raw || (raw.visibility !== undefined && raw.visibility < .4)) { b.sm = null; b.v = 0; continue; }
    const cur = [raw.x*canvas.width, raw.y*canvas.height];
    if (b.sm) {
      const nsm = [b.sm[0]+(cur[0]-b.sm[0])*.5, b.sm[1]+(cur[1]-b.sm[1])*.5];
      const v = Math.hypot(nsm[0]-b.sm[0], nsm[1]-b.sm[1]) / diag / dt;
      b.v += (v - b.v)*.4;
      b.sm = nsm;
    } else { b.sm = cur; b.v = 0; }
    sum += b.v; cnt++;
  }
  const mean = cnt ? sum/cnt : 0;
  flow += (Math.min(mean/0.12, 1) - flow) * .25;
}

/* ---- brushes ---- */
const BRUSHES = {
  mizu: {
    label:"水", bg:"#08131a",
    fade(a){
      a.globalCompositeOperation = "destination-out";
      a.fillStyle = "rgba(0,0,0,.02)";
      a.fillRect(0,0,a.canvas.width,a.canvas.height);
      a.globalCompositeOperation = "source-over";
    },
    stroke(a, s, b, v){
      /* 全身が動いてこそ川は満ちる(完整一氣の近似) */
      if (flow < .05 && v < .04) return;
      const F = flow;
      const hue = 195 + 18*F;
      a.globalCompositeOperation = "lighter";
      a.lineCap = "round";
      a.strokeStyle = `hsla(${hue},70%,${42+26*F}%,${.10+.35*F})`;
      a.lineWidth = s*(2 + 20*F);
      line(a, b.prev, b.cur);
      a.strokeStyle = `hsla(${hue-10},85%,82%,${.2+.5*F})`;
      a.lineWidth = s*(1 + 5*F);
      line(a, b.prev, b.cur);
      a.globalCompositeOperation = "source-over";
    },
  },
  tama: {
    label:"珠", bg:"#0a0a0e", transient:true,
    body(a, s){
      const pos = i => body[i] && body[i].sm;
      const vel = i => body[i] ? body[i].v : 0;
      const mS = mid(pos(11), pos(12)), mH = mid(pos(23), pos(24));
      if (!mS || !mH) return;
      const vS = (vel(11)+vel(12))/2, vH = (vel(23)+vel(24))/2;
      /* 足→膝→胯→(胯中)→(肩中)→肩→肘→手 の九曲 */
      const chains = [
        [[pos(27),vel(27)],[pos(25),vel(25)],[pos(23),vel(23)],[mH,vH],[mS,vS],[pos(11),vel(11)],[pos(13),vel(13)],[pos(15),vel(15)]],
        [[pos(28),vel(28)],[pos(26),vel(26)],[pos(24),vel(24)],[mH,vH],[mS,vS],[pos(12),vel(12)],[pos(14),vel(14)],[pos(16),vel(16)]],
      ];
      /* 珠を貫く糸 */
      a.strokeStyle = "rgba(236,231,219,.16)";
      a.lineWidth = s*1.1;
      for (const ch of chains){
        a.beginPath();
        let started = false;
        for (const [p] of ch){
          if (!p){ started = false; continue; }
          if (!started){ a.moveTo(p[0],p[1]); started = true; }
          else a.lineTo(p[0],p[1]);
        }
        a.stroke();
      }
      /* 珠: 勁が通った分だけ灯る */
      a.globalCompositeOperation = "lighter";
      const seen = new Set();
      for (const ch of chains) for (const [p,v] of ch){
        if (!p) continue;
        const key = (p[0]|0)+","+(p[1]|0);
        if (seen.has(key)) continue;
        seen.add(key);
        const act = Math.min((v||0)/0.35, 1);
        a.shadowColor = `hsla(45,95%,70%,${.8*act})`;
        a.shadowBlur = s*12*act;
        a.fillStyle = `hsla(45,90%,${50+38*act}%,${.30+.65*act})`;
        a.beginPath(); a.arc(p[0],p[1],s*(2.5+9*act),0,Math.PI*2); a.fill();
      }
      a.shadowBlur = 0;
      a.globalCompositeOperation = "source-over";
    },
  },
  hikari: {
    label:"光", bg:"#0a0c12",
    fade(a){ /* ゆっくり闇に還る */
      a.globalCompositeOperation = "destination-out";
      a.fillStyle = "rgba(0,0,0,.028)";
      a.fillRect(0,0,a.canvas.width,a.canvas.height);
      a.globalCompositeOperation = "source-over";
    },
    stroke(a, s, b, v){
      const hue = 210 + Math.min(v*160, 130);      /* 遅=藍 → 速=白光 */
      const lig = 55 + Math.min(v*120, 40);
      a.globalCompositeOperation = "lighter";
      a.strokeStyle = `hsla(${hue},85%,${lig}%,.75)`;
      a.shadowColor = `hsla(${hue},90%,70%,.9)`;
      a.shadowBlur = s*10;
      a.lineWidth = s*(1.5 + 5*Math.min(v*2,1));
      a.lineCap = "round";
      line(a, b.prev, b.cur);
      a.shadowBlur = 0;
      a.globalCompositeOperation = "source-over";
    },
  },
  honoo: {
    label:"炎", bg:"#0b0807",
    stroke(a, s, b, v, dt, tr){
      /* 動きが薪。止まっても種火は残る */
      tr.fuel = Math.max(0, Math.min(1, (tr.fuel||0) + ((v > 0.05) ? v*6 : -2.5) * dt));
      const f = tr.fuel;
      const ember = f <= 0.05;                       /* 種火 */
      const n = ember ? 1 : Math.min(1 + Math.floor(f * (4 + v*40)), 16);
      const dx = b.cur[0]-b.prev[0], dy = b.cur[1]-b.prev[1];
      for (let i=0;i<n;i++){
        const back = Math.random()*.6;
        particles.push({
          x: b.cur[0]-dx*back + (Math.random()-.5)*s*(ember?4:8),
          y: b.cur[1]-dy*back + (Math.random()-.5)*s*(ember?4:8),
          vx: dx/dt*0.05 + (Math.random()-.5)*s*(ember?18:40),
          vy: dy/dt*0.05 - s*(ember ? 20+Math.random()*25 : 50+Math.random()*90),
          life: .25 + Math.random()*.35, age:0,
          size: ember ? s*(.7+Math.random()*.9) : s*(1.4+Math.random()*2.4),
          flame:true, g:-0.6,               /* 浮力で立ちのぼる */
        });
      }
    },
  },
};
let brush = BRUSHES.mizu;
let particles = [];

/* ---- art canvas (作品面・透明地) ---- */
const art = document.createElement("canvas");
const actx = art.getContext("2d");

function line(a, p, q){ a.beginPath(); a.moveTo(p[0],p[1]); a.lineTo(q[0],q[1]); a.stroke(); }
const scaleUnit = () => Math.hypot(canvas.width, canvas.height) / 900;

/* ---- model ---- */
let landmarker = null, ready = false;
async function initModel() {
  try {
    const fileset = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
    const opts = d => ({ baseOptions:{
      modelAssetPath:"https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_full/float16/1/pose_landmarker_full.task",
      delegate:d }, runningMode:"VIDEO", numPoses:1 });
    try { landmarker = await PoseLandmarker.createFromOptions(fileset, opts("GPU")); }
    catch { landmarker = await PoseLandmarker.createFromOptions(fileset, opts("CPU")); }
    ready = true;
    statusEl.textContent = "準備ができました。動きの動画を選んでください。";
  } catch (e) {
    statusEl.textContent = "モデルの読み込みに失敗しました。通信環境を確認して再読み込みしてください。";
    console.error(e);
  }
}
initModel();

/* ---- video ---- */
$("file").addEventListener("change", e => {
  const f = e.target.files[0]; if (!f) return;
  video.src = URL.createObjectURL(f); video.load();
});
video.addEventListener("loadedmetadata", () => {
  canvas.width = art.width = video.videoWidth;
  canvas.height = art.height = video.videoHeight;
  $("seek").max = video.duration;
  $("tdur").textContent = fmt(video.duration);
  $("setup").style.display = "none";
  $("stage").classList.add("on");
  $("panel").classList.add("on");
  clearArt();
});

/* ---- tracking state ---- */
const trace = {};   /* key → {prev:[x,y]|null, sm:[x,y]|null} */
function resetTrace(){
  for (const k in POINTS) trace[k] = { prev:null, sm:null };
  for (const i of BODY_IDX) delete body[i];
  flow = 0;
}
resetTrace();
let lastT = null;

function detect(mediaT) {
  if (!ready || video.readyState < 2) return;
  let lm = null;
  try {
    const res = landmarker.detectForVideo(video, performance.now());
    lm = res.landmarks && res.landmarks[0] ? res.landmarks[0] : null;
  } catch {}
  const dt = (lastT === null || mediaT <= lastT) ? 1/30 : Math.min(mediaT - lastT, 0.2);
  lastT = mediaT;
  const s = scaleUnit(), diag = Math.hypot(canvas.width, canvas.height);

  if (brush.transient) actx.clearRect(0,0,art.width,art.height);
  if (brush.fade) brush.fade(actx);

  if (lm) updateBody(lm, dt);
  if (lm && brush.body) {
    brush.body(actx, s);
  } else if (lm) for (const k in POINTS) {
    const p = POINTS[k], t = trace[k];
    if (!p.on) { t.prev = t.sm = null; continue; }
    const raw = lm[p.idx];
    if (!raw || (raw.visibility !== undefined && raw.visibility < .4)) { t.prev = t.sm = null; continue; }
    const cur = [raw.x*canvas.width, raw.y*canvas.height];
    t.sm = t.sm ? [t.sm[0]+(cur[0]-t.sm[0])*.5, t.sm[1]+(cur[1]-t.sm[1])*.5] : cur;
    if (t.prev) {
      const v = Math.hypot(t.sm[0]-t.prev[0], t.sm[1]-t.prev[1]) / diag / dt;
      brush.stroke(actx, s, { prev:t.prev, cur:t.sm }, v, dt, t);
    }
    t.prev = t.sm;
  }
  updateParticles(dt, s);
  render();
}

function updateParticles(dt, s) {
  if (!particles.length) return;
  const g = s*120;
  particles = particles.filter(pt => (pt.age += dt) < pt.life);
  for (const pt of particles) {
    pt.x += pt.vx*dt; pt.y += pt.vy*dt;
    pt.vy += g*dt*(pt.g !== undefined ? pt.g : 0.5);
    if (pt.flame) pt.vx += (Math.random()-.5)*g*dt*0.8;   /* 揺らぎ */
    pt.vx *= 0.985; pt.vy *= 0.985;
  }
}

function drawParticles(c) {
  if (!particles.length) return;
  c.globalCompositeOperation = "lighter";
  for (const pt of particles) {
    const k = 1 - pt.age/pt.life;
    const tw = .5 + Math.random()*.5;           /* きらめき */
    if (pt.flame) {
      const t = pt.age/pt.life;
      c.fillStyle = `hsla(${55-38*t},100%,${62-18*t}%,${(1-t)*.9*tw})`;
    } else {
      c.fillStyle = pt.white
        ? `rgba(255,252,240,${.9*k*tw})`
        : `hsla(${pt.hue},95%,65%,${.85*k*tw})`;
    }
    c.beginPath(); c.arc(pt.x, pt.y, pt.size*(.4+.6*k), 0, Math.PI*2); c.fill();
  }
  c.globalCompositeOperation = "source-over";
}
function render() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(art,0,0);
  drawParticles(ctx);
}

/* ---- loop ---- */
function loop(now, meta) {
  detect(meta ? meta.mediaTime : video.currentTime);
  syncSeek();
  if (!video.paused && !video.ended) schedule();
  else { setPlayLabel(); afterglow(); }
}
/* 動画が止まった後も、残った粒と炎は燃え尽きるまで生きる */
let agOn = false, agLast = null;
function afterglow() {
  if (agOn) return;
  agOn = true; agLast = null;
  const tick = ts => {
    if ((!video.paused && !video.ended) || !particles.length) {
      agOn = false; agLast = null; render(); return;
    }
    const dt = agLast ? Math.min((ts-agLast)/1000, .05) : 1/60;
    agLast = ts;
    updateParticles(dt, scaleUnit()); render();
    requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}
function schedule() {
  if ("requestVideoFrameCallback" in video) video.requestVideoFrameCallback(loop);
  else requestAnimationFrame(t => loop(t, null));
}

/* ---- controls ---- */
const playBtn = $("play");
function setPlayLabel(){
  playBtn.textContent = (video.paused||video.ended) ? "▶ 書きはじめる" : "❚❚ 休む";
}
playBtn.addEventListener("click", async () => {
  if (video.paused || video.ended) { await video.play(); schedule(); }
  else video.pause();
  setPlayLabel();
});
$("restart").addEventListener("click", async () => {
  video.currentTime = 0; clearArt();
  await video.play(); schedule(); setPlayLabel();
});
function clearArt(){
  actx.clearRect(0,0,art.width,art.height);
  particles = []; resetTrace(); lastT = null;
  document.getElementById("stage").style.background = brush.bg;
  render();
}

$("brushSeg").addEventListener("click", e => {
  const b = e.target.closest("button"); if (!b) return;
  brush = BRUSHES[b.dataset.b];
  for (const x of $("brushSeg").children) x.classList.toggle("active", x===b);
  /* 珠は全身表示なので追跡点の選択が効かない */
  document.querySelectorAll(".tgl[data-p]").forEach(t => t.classList.toggle("off", !!brush.body));
  clearArt();
});

/* ---- seek & speed ---- */
const seek = $("seek");
let scrubbing = false;
seek.addEventListener("input", () => {
  scrubbing = true;
  video.pause(); setPlayLabel();
  video.currentTime = parseFloat(seek.value);
});
seek.addEventListener("change", () => { scrubbing = false; });
video.addEventListener("seeked", () => {
  /* 飛んだ分を線で結ばないよう、筆を一度紙から離す */
  for (const k in POINTS) trace[k] = { prev:null, sm:null };
  lastT = null;
  detect(video.currentTime);
  syncSeek();
});
function syncSeek() {
  if (!scrubbing) seek.value = video.currentTime;
  $("tcur").textContent = fmt(video.currentTime);
}
function fmt(t) {
  t = t || 0;
  const m = Math.floor(t/60), sec = (t%60).toFixed(1).padStart(4,"0");
  return `${m}:${sec}`;
}
$("speedSeg").addEventListener("click", e => {
  const b = e.target.closest("button"); if (!b) return;
  video.playbackRate = parseFloat(b.dataset.s);
  for (const x of $("speedSeg").children) x.classList.toggle("active", x===b);
});

document.querySelectorAll(".tgl[data-p]").forEach(t => {
  t.addEventListener("click", () => {
    const p = POINTS[t.dataset.p];
    p.on = !p.on;
    t.classList.toggle("active", p.on);
  });
});
$("ghost").addEventListener("click", () => {
  video.classList.toggle("hidden");
  $("ghost").classList.toggle("active", !video.classList.contains("hidden"));
});

$("save").addEventListener("click", () => {
  const out = document.createElement("canvas");
  out.width = art.width; out.height = art.height;
  const octx = out.getContext("2d");
  octx.fillStyle = brush.bg;
  octx.fillRect(0,0,out.width,out.height);
  octx.drawImage(art,0,0);
  drawParticles(octx);
  out.toBlob(blob => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `yuhitsu-${brush.label}-${Date.now()}.png`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  }, "image/png");
});
</script>
</body>
</html>
